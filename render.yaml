# Render Blueprint for IJP HR CMS Manager
# https://render.com/docs/blueprint-spec
#
# Two services:
#   1. ijp-cms-server - Express API (Node web service)
#   2. ijp-cms-client - Vite static site
#
# All secret values use `sync: false`, meaning Render will prompt for them
# in the dashboard rather than storing them in this file / git history.

services:
  - type: web
    name: ijp-cms-server
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    # --include=dev is required: NODE_ENV=production (set below) makes plain
    # `npm install` skip devDependencies entirely, which includes TypeScript
    # itself and every @types/* package the build needs.
    buildCommand: npm install --include=dev && npm run build:server
    startCommand: npm run start -w server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLIENT_ORIGIN
        sync: false
      - key: WEBFLOW_API_TOKEN
        sync: false
      - key: WEBFLOW_SITE_ID
        sync: false
      - key: WEBFLOW_COLLECTION_ID
        value: 6a533add938a981683bbfe8b
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: ijp-cms-client
    runtime: static
    rootDir: .
    buildCommand: npm install --include=dev && npm run build:client
    staticPublishPath: client/dist
    envVars:
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
